<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Will You Be My Valentine? ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1ff);
    position:relative;
}

/* Floating Hearts */
.hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
}

.heart{
    position:absolute;
    bottom:-50px;
    color:rgba(255,255,255,.5);
    animation:float linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

/* Card */
.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:520px;
    height:430px;
    background:rgba(255,255,255,.2);
    backdrop-filter:blur(15px);
    border-radius:30px;
    box-shadow:0 20px 50px rgba(0,0,0,.2);
    text-align:center;
    padding:35px;
    overflow:hidden;
}

h1{
    color:white;
    font-size:38px;
    margin-top:15px;
    text-shadow:2px 2px 10px rgba(0,0,0,.25);
}

.subtitle{
    color:white;
    margin-top:18px;
    font-size:18px;
}

/* Buttons */
button{
    position:absolute;
    width:170px;
    height:65px;
    border:none;
    border-radius:50px;
    font-size:24px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

button:hover{
    transform:scale(1.08);
}

#yes{
    left:40px;
    bottom:40px;
    background:linear-gradient(45deg,#22c55e,#16a34a);
}

#no{
    right:40px;
    bottom:40px;
    background:linear-gradient(45deg,#ef4444,#dc2626);
}

/* Result */
.result{
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    animation:pop .5s;
}

.result h1{
    font-size:55px;
}

.result p{
    color:white;
    font-size:24px;
    margin-top:15px;
}

@keyframes pop{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* Confetti */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(120vh) rotate(720deg);
    }
}
</style>

</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container" id="container">

    <h1>❤️ Will You Be My Valentine? ❤️</h1>

    <p class="subtitle">
        Please choose carefully... 😊
    </p>

    <button id="yes">Yes</button>
    <button id="no">No</button>

</div>


<script>
</body>
</html>
    <script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");
const container = document.getElementById("container");
const hearts = document.getElementById("hearts");

// Floating Hearts
for(let i = 0; i < 25; i++){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "%";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";
    heart.style.animationDelay = (Math.random() * 5) + "s";
    hearts.appendChild(heart);
}

// Move NO button without covering YES
no.addEventListener("click", function(){

    const noWidth = no.offsetWidth;
    const noHeight = no.offsetHeight;

    let x, y;
    let valid = false;

    while(!valid){

        x = Math.random() * (container.clientWidth - noWidth - 20) + 10;
        y = Math.random() * (container.clientHeight - noHeight - 20) + 10;

        const yesLeft = yes.offsetLeft;
        const yesTop = yes.offsetTop;
        const yesRight = yesLeft + yes.offsetWidth;
        const yesBottom = yesTop + yes.offsetHeight;

        const noLeft = x;
        const noTop = y;
        const noRight = x + noWidth;
        const noBottom = y + noHeight;

        valid =
            noRight < yesLeft - 100 ||
            noLeft > yesRight + 100 ||
            noBottom < yesTop - 100 ||
            noTop > yesBottom + 100;
    }

    no.style.left = x + "px";
    no.style.top = y + "px";
    no.style.right = "auto";
    no.style.bottom = "auto";
});

// YES button
yes.addEventListener("click", function(){

    container.innerHTML = `
        <div class="result">
            <h1>🥰 YEYYYY!! ❤️</h1>
            <p>You made my day! 💖</p>
        </div>
    `;

    // Confetti
    for(let i = 0; i < 120; i++){

        const conf = document.createElement("div");
        conf.className = "confetti";

        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background =
            "hsl(" + (Math.random() * 360) + ",100%,60%)";

        conf.style.animationDuration =
            (2 + Math.random() * 2) + "s";

        document.body.appendChild(conf);

        setTimeout(function(){
            conf.remove();
        },4000);
    }

});
</script>
