<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Will You Be My Valentine? ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1ff);
    position:relative;
}

/* Floating Hearts */

.hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
}

.heart{
    position:absolute;
    bottom:-40px;
    color:rgba(255,255,255,.45);
    animation:float linear infinite;
}

@keyframes float{

0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}

}

/* Card */

.container{

position:relative;
z-index:2;

width:90%;
max-width:520px;
height:430px;

background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);

border-radius:30px;

box-shadow:0 20px 45px rgba(0,0,0,.2);

padding:35px;

text-align:center;

overflow:hidden;

}

h1{

color:white;
font-size:38px;
margin-top:20px;
text-shadow:2px 2px 10px rgba(0,0,0,.2);

}

.subtitle{

margin-top:18px;
color:white;
font-size:18px;

}

/* Buttons */

button{

position:absolute;

width:160px;
height:60px;

border:none;
border-radius:50px;

font-size:22px;
font-weight:bold;

cursor:pointer;

color:white;

transition:.25s;

box-shadow:0 10px 20px rgba(0,0,0,.25);

}

button:hover{

transform:scale(1.05);

}

/* YES stays fixed */

#yes{

left:35px;
bottom:35px;

background:linear-gradient(45deg,#22c55e,#16a34a);

}

/* NO will move but never resize */

#no{

right:35px;
bottom:35px;

background:linear-gradient(45deg,#ef4444,#dc2626);

}

.result{

height:100%;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

animation:pop .5s;

}

.result h1{

font-size:52px;

}

.result p{

font-size:24px;
color:white;
margin-top:15px;

}

@keyframes pop{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.confetti{

position:fixed;
width:10px;
height:10px;
animation:fall linear forwards;

}

@keyframes fall{

from{
transform:translateY(-100px) rotate(0deg);
}

to{
transform:translateY(120vh) rotate(720deg);
}

}

</style>

</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container" id="container">

<h1>❤️ Will You Be My Valentine? ❤️</h1>

<p class="subtitle">
Choose wisely... 😊
</p>

<button id="yes">Yes ❤️</button>

<button id="no">No 💔</button>

</div>

<!-- Part 2 goes here -->
    <script>

const yes = document.getElementById("yes");
const no = document.getElementById("no");
const container = document.getElementById("container");
const hearts = document.getElementById("hearts");

/* ---------- Floating Hearts ---------- */

for(let i = 0; i < 30; i++){

    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * 100 + "%";
    heart.style.fontSize = (16 + Math.random() * 20) + "px";

    heart.style.animationDuration =
        (6 + Math.random() * 6) + "s";

    heart.style.animationDelay =
        Math.random() * 6 + "s";

    hearts.appendChild(heart);

}

/* ---------- NO Button ---------- */

no.addEventListener("click", function(){

    const noWidth = no.offsetWidth;
    const noHeight = no.offsetHeight;

    const yesLeft = yes.offsetLeft;
    const yesTop = yes.offsetTop;
    const yesRight = yesLeft + yes.offsetWidth;
    const yesBottom = yesTop + yes.offsetHeight;

    let x;
    let y;
    let safe = false;
    let attempts = 0;

    while(!safe && attempts < 200){

        x = Math.random() *
            (container.clientWidth - noWidth - 20) + 10;

        y = Math.random() *
            (container.clientHeight - noHeight - 20) + 10;

        const noLeft = x;
        const noTop = y;
        const noRight = x + noWidth;
        const noBottom = y + noHeight;

        safe = (

            noRight < yesLeft - 80 ||

            noLeft > yesRight + 80 ||

            noBottom < yesTop - 80 ||

            noTop > yesBottom + 80

        );

        attempts++;

    }

    if(!safe){

        x = container.clientWidth - noWidth - 20;
        y = 20;

    }

    no.style.left = x + "px";
    no.style.top = y + "px";
    no.style.right = "auto";
    no.style.bottom = "auto";

});
       /* ---------- YES Button ---------- */

yes.addEventListener("click", function(){

    container.innerHTML = `
        <div class="result">
            <h1>🥰 YEYYYY!! ❤️</h1>
            <p>You made my day! 💖</p>
        </div>
    `;

    for(let i = 0; i < 150; i++){

        const conf = document.createElement("div");

        conf.className = "confetti";

        conf.style.left = Math.random() * 100 + "vw";
        conf.style.top = "-20px";

        conf.style.background =
            `hsl(${Math.random()*360},100%,60%)`;

        conf.style.animationDuration =
            (2 + Math.random()*2) + "s";

        document.body.appendChild(conf);

        setTimeout(function(){
            conf.remove();
        },4000);
    }

});

</script>

</body>
</html>
